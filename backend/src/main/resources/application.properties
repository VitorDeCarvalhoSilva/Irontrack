spring.application.name=irontrack-api

# Datasource SQLite (05_DEVOPS_E_SEGURANCA.md §D) - caminho lido de DATABASE_PATH,
# nunca hardcoded. "foreign_keys=on" ativa PRAGMA foreign_keys por conexão
# (02_SCHEMA_SQLITE.md §2) via parâmetro de URL suportado nativamente pelo driver sqlite-jdbc.
spring.datasource.url=jdbc:sqlite:${DATABASE_PATH}?foreign_keys=on
spring.datasource.driver-class-name=org.sqlite.JDBC

spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
# Schema é gerenciado exclusivamente por Flyway - Hibernate nunca gera/altera DDL.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JWT (01_ARQUITETURA_E_PADROES.md §2.4) - JwtTokenProvider real é Sprint 1;
# dependência e propriedades já preparadas para não exigir retrabalho de configuração.
irontrack.jwt.secret-key=${JWT_SECRET_KEY}
irontrack.jwt.access-token-expiration-ms=${JWT_ACCESS_TOKEN_EXPIRATION_MS:900000}
irontrack.jwt.refresh-token-expiration-ms=${JWT_REFRESH_TOKEN_EXPIRATION_MS:604800000}

# CORS (05_DEVOPS_E_SEGURANCA.md §E.3)
irontrack.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:19000}

# SMTP (EmailService é Sprint 1) - variáveis já mapeadas para não exigir retrabalho
spring.mail.host=${SMTP_HOST:}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USER:}
spring.mail.password=${SMTP_PASSWORD:}
irontrack.mail.from-address=${MAIL_FROM_ADDRESS:no-reply@irontrack.app}

# Swagger/OpenAPI (springdoc) - acessível em /swagger-ui.html
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
