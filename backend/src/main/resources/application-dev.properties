# Perfil de desenvolvimento local - valores de exemplo SEGUROS, nunca reais.
# Ativar com --spring.profiles.active=dev (ou SPRING_PROFILES_ACTIVE=dev).
# Nunca usar estes valores em staging/produção (01_ARQUITETURA_E_PADROES.md §6.1).

DATABASE_PATH=./data/irontrack-dev.db

# Seed de exercícios (07_ROADMAP_BACKEND.md §C.0, item 4) - roda apenas neste
# perfil, nunca em produção/staging (application.properties usa só db/migration).
spring.flyway.locations=classpath:db/migration,classpath:db/dev-migration

# Chave simétrica de exemplo apenas para ambiente local - gerada aleatoriamente,
# sem qualquer significado, e sem uso fora desta máquina de desenvolvimento.
JWT_SECRET_KEY=dev-local-only-3f8a1c2e9b7d4f6a0c5e8b2d7f1a4c9e6b3d0f7a2c5e8b1d4f7a0c3e6b9d2f5a
JWT_ACCESS_TOKEN_EXPIRATION_MS=900000
JWT_REFRESH_TOKEN_EXPIRATION_MS=604800000

CORS_ALLOWED_ORIGINS=http://localhost:19000,http://localhost:8081

# SMTP_HOST vazio por padrão: EmailService (07_ROADMAP_BACKEND.md §C.1, item 7)
# apenas loga o e-mail em vez de enviar de fato quando não há provedor SMTP
# real configurado - nenhum servidor SMTP local é exigido para rodar em dev.
# Para testar envio real localmente, aponte para um SMTP de teste (ex:
# MailHog/smtp4dev) via variável de ambiente, sem alterar este arquivo.
SMTP_HOST=
SMTP_PORT=1025
SMTP_USER=dev
SMTP_PASSWORD=dev
MAIL_FROM_ADDRESS=dev@irontrack.local

springdoc.swagger-ui.enabled=true
